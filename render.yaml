services:
  - type: web
    name: photobooth-strip-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CLIENT_ORIGIN
        value: "*"

  - type: web
    name: photobooth-strip-client
    runtime: static
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        value: https://photobooth-strip-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
